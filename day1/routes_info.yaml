# Ingress Controller Architecture and Routes vs Ingress (OpenShift)

## 1. Ingress Controller Architecture in OpenShift

### Core concept

In Kubernetes, an Ingress Controller handles external HTTP/HTTPS traffic.

In OpenShift, this is implemented using:

- Router (HAProxy-based)
- Ingress Operator (manages router lifecycle)

### Architecture Flow

![Architecture diagram 1](net3.png)
![Architecture diagram 2](net4.png)
![Architecture diagram 3](net5.png)

### Components 

1. Ingress Operator
   - Manages router deployment
   - Handles scaling, updates, and configuration
2. Router pods (HAProxy)
   - Run on worker nodes
   - Handle TLS termination, load balancing, and host/path routing
3. Service and Pod
   - Router forwards traffic to Service
   - Service forwards traffic to backend Pods

### Traffic flow

1. User request reaches DNS.
2. DNS resolves to Router (Ingress Controller).
3. Router matches hostname and path.
4. Router applies TLS behavior.
5. Router forwards to Service.
6. Service forwards to target Pod.

### Key insight

In OpenShift, the router effectively combines:

- Ingress Controller
- Load Balancer
- TLS Gateway

---

## 2. Routes vs Ingress

### Core difference

| Feature | Route (OpenShift) | Ingress (Kubernetes standard) |
| --- | --- | --- |
| Native to OpenShift | Yes | No |
| Simplicity | Very simple | More generic |
| TLS support | Built-in and advanced | Requires controller-specific config |
| Features | Rich (`edge`, `re-encrypt`, `passthrough`) | More limited by default |
| Controller | OpenShift Router | Depends on chosen Ingress controller |

### What is a Route?

An OpenShift-specific API object used to expose Services externally.

Example:

```yaml
kind: Route
spec:
  host: app.example.com
  to:
    kind: Service
    name: my-app
```

### What is Ingress?

A standard Kubernetes API object for HTTP/HTTPS routing.

Example:

```yaml
kind: Ingress
spec:
  rules:
    - host: app.example.com
```

### Practical guidance

In OpenShift environments:

- Routes are typically preferred.
- Ingress is supported, but usually less feature-rich than Routes on OpenShift.

### Real-world usage

- OpenShift-centric enterprise environments: prefer Routes
- Multi-cloud portability scenarios: prefer Ingress

