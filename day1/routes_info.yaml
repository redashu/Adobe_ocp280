## 3. TLS Termination Types (Critical)

This is a key OpenShift router capability.

<img src="route1.png">


### 3.1 Edge Termination

#### Concept

TLS terminates at the OpenShift Router.

Flow:

1. Client sends HTTPS request to Router.
2. Router decrypts TLS.
3. Router forwards plain HTTP to backend Service/Pod.

#### Behavior

- Router handles certificate and TLS negotiation.
- Backend receives unencrypted HTTP.

#### Typical use cases

- Internal applications
- Performance-sensitive workloads

#### Risk

- Traffic inside the cluster is not encrypted between Router and backend.

### 3.2 Re-encrypt Termination

#### Concept

TLS terminates at the Router and is re-established from Router to backend.

Flow:

1. Client sends HTTPS to Router.
2. Router decrypts traffic.
3. Router re-encrypts traffic to backend using backend TLS cert.

#### Behavior

- Router performs TLS termination and re-encryption.
- Backend certificate validation is supported.

#### Typical use cases

- Banking and highly secure applications
- Compliance-driven environments requiring encryption in transit end-to-end

### 3.3 Passthrough Termination

#### Concept

Router does not terminate TLS; TLS remains end-to-end between client and backend.

Flow:

1. Client establishes HTTPS session.
2. Router forwards TCP stream without decrypting payload.
3. Backend terminates TLS.

#### Behavior

- Router performs L4 forwarding only.
- No TLS inspection or HTTP-level processing at the router.

#### Typical use cases

- mTLS applications
- Custom TLS handling
- gRPC and advanced protocol scenarios

#### Limitations

- No L7/path-based routing
- No TLS payload inspection at Router

### TLS Modes Comparison

| Feature | Edge | Re-encrypt | Passthrough |
| --- | --- | --- | --- |
| TLS terminated at Router | Yes | Yes | No |
| TLS from Router to backend | No | Yes | Yes (client to backend directly) |
| End-to-end encryption | No | Yes | Yes |
| Performance profile | High | Medium | High |
| Security level | Lower | High | Very high |
| Best for | Simple apps | Secure apps | Advanced TLS workloads |

