## 4. Lab: Create Routes

### Edge route

```bash
oc create route edge my-route \
  --service=my-service \
  --hostname=app.example.com
```

### Re-encrypt route

```bash
oc create route reencrypt my-route \
  --service=my-service \
  --hostname=secure.example.com \
  --cert=cert.pem \
  --key=key.pem \
  --dest-ca-cert=ca.pem
```

### Passthrough route

```bash
oc create route passthrough my-route \
  --service=my-service \
  --hostname=passthrough.example.com
```

---

## 5. Debugging Scenarios

### Route not working

Run:

```bash
oc get route
oc describe route <name>
```

### TLS issues

Common causes:

- Certificate mismatch
- Invalid backend certificate (especially for re-encrypt)

### HTTP 503 errors

Possible cause: Service has no endpoints.

Run:

```bash
oc get endpoints
```